version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: digest_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  xray-client:
      image: teddysun/xray:latest
      container_name: xray_client
      ports:
      - "1080:1080"
      restart: unless-stopped
      volumes:
        - ./config/config.json:/etc/xray/config.json:ro

  tg_bot:
    build: .
    container_name: tg_bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis

  digest_pipeline:
    build: .
    container_name: digest_pipeline
    restart: always
    command: python main.py 
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis


volumes:
  postgres_data:
  redis_data: