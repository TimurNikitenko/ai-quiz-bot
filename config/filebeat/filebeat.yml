filebeat.inputs:
  - type: container
    paths:
      - '/var/lib/docker/containers/*/*.log'
    json.keys_under_root: true
    json.add_error_key: true
    json.message_key: message
    json.ignore_decoding_error: true

processors:
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"
  - drop_event:
      when:
        not:
          equals:
            container.labels.com_docker_compose_project: "ai-quiz-bot"

output.elasticsearch:
  hosts: ["http://elasticsearch-quiz:9200"]
  username: "elastic"
  password: "${ELASTIC_QUIZ_PASSWORD}"
  index: "quiz-logs-%{+yyyy.MM.dd}"

setup.ilm.enabled: false
setup.template.enabled: false
setup.template.name: "quiz-logs"
setup.template.pattern: "quiz-logs-*"
setup.pipelines.enabled: false

logging.level: info
logging.to_files: false
